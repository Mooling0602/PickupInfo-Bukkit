name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - run: mvn clean package
      - uses: softprops/action-gh-release@v2
        with:
          files: target/PickupInfo-*.jar
          tag_name: ${{ github.ref_name }}
          name: PickupInfo ${{ github.ref_name }}
          body: |
            PickupInfo ${{ github.ref_name }}

            ## Changes

            <!-- Summarize changes since the last release here -->

            ## Installation

            Download `PickupInfo-*.jar` and place it in your server's `plugins/` folder.
